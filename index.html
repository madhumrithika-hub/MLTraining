<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Random Forest — Train Delay Predictor</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Bebas+Neue&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-layer">
  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <div class="bg-scan"></div>
</div>

<div class="card">
  <div class="card-top-bar"></div>
  <div class="card-inner">

    <div class="header">
      <div class="tag"><div class="tag-dot"></div>ML Model Active</div>
      <h1>RANDOM<br>FOREST</h1>
      <div class="sub">Train Delay Prediction Engine&nbsp;&nbsp;·&nbsp;&nbsp;Indian Railways</div>
    </div>

    <div class="divider"></div>

    <div class="inputs">
      <div class="field">
        <div class="field-label">
          <span class="field-label-icon">🚆</span> Train Number
        </div>
        <input type="number" id="train_no" placeholder="12345" min="1"/>
        <div class="field-hint">e.g. 12345, 22691</div>
      </div>
      <div class="field">
        <div class="field-label">
          <span class="field-label-icon">📍</span> Stop Sequence
        </div>
        <input type="number" id="stop_seq" placeholder="3" min="1"/>
        <div class="field-hint">Station index in route</div>
      </div>
    </div>

    <button class="btn" id="btn" onclick="runPrediction()">
      <div class="btn-bg"></div>
      <div class="btn-icon">
        <div class="spinner"></div>
        <svg class="arr-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="btn-text"><span>RUN PREDICTION</span></span>
    </button>

    <div class="progress-line" id="progress"><div class="progress-fill"></div></div>

    <div class="error-msg" id="error-msg"></div>

    <div class="results" id="results">
      <div class="res-card arr">
        <div class="res-label">Arrival Delay</div>
        <div class="res-value" id="arr-val">—</div>
        <div class="res-unit">minutes</div>
        <div class="res-bar"><div class="res-bar-fill" id="arr-bar"></div></div>
        <div id="arr-badge"></div>
      </div>
      <div class="res-card dep">
        <div class="res-label">Departure Delay</div>
        <div class="res-value" id="dep-val">—</div>
        <div class="res-unit">minutes</div>
        <div class="res-bar"><div class="res-bar-fill" id="dep-bar"></div></div>
        <div id="dep-badge"></div>
      </div>
    </div>

    <div class="footer">
      <div class="footer-stat">From - ThamizhanEnterprises <span>^^</span></div>
      <div class="nodes">
        <div class="node"></div><div class="node"></div><div class="node"></div>
        <div class="node"></div><div class="node"></div><div class="node"></div>
        <div class="node"></div>
      </div>
    </div>

  </div>
</div>
<script src="script.js"></script>

</body>
</html>
